<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo de iframe</title>
    <style>
        iframe{
            height: 400px;
            width: 400px;
        }
    </style>
</head>
<body>
    <!-- Tamanho padrao 300x150
    -->
    <h1>Testando o uso de um iframe</h1>
    <p>Acessando o site do <iframe src="https://www.cursoemvideo.com" frameborder="0" scolling="no">
        <a href="https://www.cursoemvideo.com" target="_blank" >Curso em Video</a>
    </iframe> para aprender a programar</p>
    <p>O site do <iframe src="https://www.Google.com.br" frameborder="0">

    </iframe> é muito legal pena que não funciona dentro de um iframe </p>
    <p>
        o repositório do Guanabara
        <iframe src="https://gustavoguanabara.github.io"  frameborder="0">
            <a href="https://gustavoguanabara.github.io" target="_blank">Github</a>
        </iframe>
        também e bem legal
    </p>
    
</body>
</html>
