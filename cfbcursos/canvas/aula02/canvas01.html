<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula - 02</title>
    <style>
        #desenho1{
            border: 1px solid black;
        }
    </style>
    <script>
        function desenha(){
            var px =50
            var py =50
            var canvas = document.getElementById('desenho1')
            var ctx = canvas.getContext('2d')
            ctx.fillStyle = "#00f"
            ctx.Rect(px,py,200,200)
            ctx.fill()
            ctx.clearRect(50,50,100,100)
            
        }
        
    </script>
</head>
<body onload="desenha()">
    <canvas id="desenho1" width="500" height="500">
        <h1></h1>
        <h3>Seu browser não suporta ao canvas</h3>

    </canvas>
</body>
</html>
