<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas no HTML5</title>
    <style>
        #desenho{
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <canvas id="desenho" width="500" height="500">
        <p>Seu browser não possui suporte ao canvas</p>
    </canvas>
    <script>
        let des = document.getElementById('desenho')
        let draw = des.getContext("2d")
        draw.fillStyle ="blue"
        draw.fillRect(0,0,200,200)
        

    </script>
</body>
</html>
